<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyTrack</title>
    <link rel="shortcut icon" href="img/logo-easytrack-solo.png" type="image/x-icon">
</head>
<body>
    <nav>
        <img src="img/logo-easytrack.png" alt="Logo de EasyTrack" width="200">
        <ul>
            <li><img src="img/logo-home.svg" alt="Logo de la página de inicio"><a href="index.html">Página de Inicio</a></li>
            <li><img src="img/logo-como-trabajamos.svg" alt=""><a href="about.html">Cómo Trabajamos</a></li>
            <li><img src="img/logo-preguntas-frecuentes.svg" alt=""><a href="contact.html">Preguntas Frecuentes</a></li>
        </ul>
        <ul>
            <li><img src="img/logo-ayuda.svg" alt=""><a href="ayuda.html">Ayuda</a></li>
            <li><img src="img/logo-cerrar-sesion.svg" alt=""><a href="cerrar-sesion.html">Cerrar Sesión</a></li>
        </ul>
    </nav>
    <main>
        <h1>¡Bienvenido a EasyTrack!</h1>
        <p>Introduce tu número de seguimiento para empezar.</p>
        <form action="#">
            <div>
                <label for="tracking-number">Número de seguimiento:</label>
                <input type="text" id="tracking-number" placeholder="Ej 8572138299">
                <div>
                    <span>Método de seguimiento</span>
                    <div>
                        <input type="radio" name="tracking-method" id="email">
                        <label for="email">
                            <img src="img/logo-email.svg" alt="Icono correo electrónico">
                            <strong>Correo Electrónico</strong>
                            <p>Notificaciones al email</p>
                        </label>
                    </div>
                    <div>
                        <input type="radio" name="tracking-method" id="whatsapp">
                        <label for="whatsapp">
                            <img src="img/logo-whatsapp.svg" alt="Icono WhatsApp" width="24px">
                            <strong>WhatsApp</strong>
                            <p>Notificaciones por WhatsApp</p>
                        </label>
                    </div>
                </div>
                <button type="submit">Ver el estado del pedido</button>
            </div>
        </form>
    </main>
</body>
</html>
