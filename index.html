<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyTrack</title>
    <link rel="shortcut icon" href="img/logo-easytrack-solo.png" type="image/x-icon">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <nav>
        <a class="logo" href="index.html">
            <img src="img/logo-easytrack.png" alt="Logo de EasyTrack" width="200">
        </a>
        <ul>
            <li><a href="index.html" class="active"><img src="img/active/logo-home.svg" alt="Logo de la página de inicio">Página de Inicio</a></li>
            <li><a href="como-trabajamos.html"><img src="img/logo-como-trabajamos.svg" alt="Logo de Cómo Trabajamos">Cómo Trabajamos</a></li>
            <li><a href="preguntas-frecuentes.html"><img src="img/logo-preguntas-frecuentes.svg" alt="Logo de Preguntas Frecuentes">Preguntas Frecuentes</a></li>
        </ul>
        <ul class="bottom">
            <li><a href="ayuda.html"><img src="img/logo-ayuda.svg" alt="Logo de Ayuda">Ayuda</a></li>
            <li><a href="cerrar-sesion.html"><img src="img/logo-cerrar-sesion.svg" alt="Logo de Cerrar Sesión">Cerrar Sesión</a></li>
        </ul>
    </nav>
    <main>
        <div class="container">
            <h1>¡Bienvenido a EasyTrack!</h1>
            <p class="p-center">Introduce tu número de seguimiento para empezar.</p>
            <form action="#">
                <div class="box">
                    <label class="numero-seguimiento" for="tracking-number">NÚMERO DE SEGUIMIENTO:</label>
                    <input type="text" id="tracking-number" placeholder="Ej 8572138299">
                    <div class="metodo-seguimiento">
                        <span class="titulo-metodo-seguimiento">MÉTODO DE SEGUIMIENTO</span>
                        <div class="metodos-seguimiento">
                            <div class="email">
                                <label for="email">
                                    <input type="radio" name="tracking-method" id="email">
                                    <img src="img/logo-email.svg" alt="Icono correo electrónico">
                                    <strong>Correo Electrónico</strong>
                                    <p>Notificaciones al email</p>
                                </label>
                            </div>
                            <div class="whatsapp">
                                <label for="whatsapp">
                                    <input type="radio" name="tracking-method" id="whatsapp">
                                    <img src="img/logo-whatsapp.svg" alt="Icono WhatsApp" width="24px">
                                    <strong>WhatsApp</strong>
                                    <p>Notificaciones por WhatsApp</p>
                                </label>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn">
                        <span>Ver el estado del pedido</span>
                        <img src="img/logo-flecha-button.svg" alt="Icono">
                    </button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
