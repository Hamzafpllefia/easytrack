<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Inicia sesión o crea tu cuenta en EasyTrack para rastrear tus pedidos fácilmente.">
    <title>Iniciar Sesión - EasyTrack</title>
    <link rel="shortcut icon" href="img/logo-easytrack-solo.png" type="image/x-icon">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <nav>
        <a class="logo" href="index.html">
            <img src="img/logo-easytrack.png" alt="Logo de EasyTrack" width="200">
        </a>
        <ul>
            <li><a href="index.html"><img src="img/logo-home.svg" alt="Logo de la página de inicio">Página de Inicio</a></li>
            <li><a href="como-trabajamos.html"><img src="img/logo-como-trabajamos.svg" alt="Logo de Cómo Trabajamos">Cómo Trabajamos</a></li>
            <li><a href="preguntas-frecuentes.html"><img src="img/logo-preguntas-frecuentes.svg" alt="Logo de Preguntas Frecuentes">Preguntas Frecuentes</a></li>
        </ul>
        <ul class="bottom">
            <li><a href="ayuda.html"><img src="img/logo-ayuda.svg" alt="Logo de Ayuda">Ayuda</a></li>
        </ul>
    </nav>

    <main>
        <div class="container">
            <div class="login-box">
                <h1 id="login-title">Iniciar Sesión</h1>
                <p class="subtitle" id="login-subtitle">Accede a tu cuenta de EasyTrack</p>

                <!-- ── FORMULARIO DE LOGIN ── -->
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Correo Electrónico:</label>
                        <input type="email" id="login-email" placeholder="tu@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="login-password">Contraseña:</label>
                        <input type="password" id="login-password" placeholder="Tu contraseña" required>
                    </div>

                    <button type="submit" class="btn-submit" id="btn-login" data-label="Iniciar Sesión">
                        Iniciar Sesión
                    </button>
                </form>

                <!-- ── FORMULARIO DE REGISTRO (oculto por defecto) ── -->
                <form id="register-form" style="display: none;">
                    <div class="form-group">
                        <label for="reg-nombre">Nombre completo:</label>
                        <input type="text" id="reg-nombre" placeholder="Tu nombre" required>
                    </div>

                    <div class="form-group">
                        <label for="reg-email">Correo Electrónico:</label>
                        <input type="email" id="reg-email" placeholder="tu@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="reg-password">Contraseña:</label>
                        <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required>
                    </div>

                    <div class="form-group">
                        <label for="reg-password2">Repetir contraseña:</label>
                        <input type="password" id="reg-password2" placeholder="Repite la contraseña" required>
                    </div>

                    <button type="submit" class="btn-submit" id="btn-register" data-label="Crear Cuenta">
                        Crear Cuenta
                    </button>
                </form>

                <div class="divider">O</div>

                <button id="btn-google" class="btn-google">
                    <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
                        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="#4285F4"/>
                        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/>
                        <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332Z" fill="#FBBC05"/>
                        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58Z" fill="#EA4335"/>
                    </svg>
                    <span>Iniciar sesión con Google</span>
                </button>

                <!-- Link cambio entre modos -->
                <p class="signup-link" id="link-to-register">
                    ¿No tienes cuenta? <a href="#" id="btn-show-register">Regístrate aquí</a>
                </p>
                <p class="signup-link" id="link-to-login" style="display:none;">
                    ¿Ya tienes cuenta? <a href="#" id="btn-show-login">Inicia sesión</a>
                </p>

                <!-- Mensajes -->
                <div id="error-message" class="error-message"></div>
                <div id="success-message" class="success-message"></div>
            </div>
        </div>
    </main>

    <!-- Supabase v2 fijado -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config-supabase.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
