<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - EasyTrack</title>
    <link rel="shortcut icon" href="img/logo-easytrack-solo.png" type="image/x-icon">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <nav>
        <a class="logo" href="index.html">
            <img src="img/logo-easytrack.png" alt="Logo de EasyTrack" width="200">
        </a>
        <ul>
            <li><a href="index.html"><img src="img/logo-home.svg" alt="Logo de la página de inicio">Página de Inicio</a></li>
            <li><a href="como-trabajamos.html"><img src="img/logo-como-trabajamos.svg" alt="Logo de Cómo Trabajamos">Cómo Trabajamos</a></li>
            <li><a href="preguntas-frecuentes.html"><img src="img/logo-preguntas-frecuentes.svg" alt="Logo de Preguntas Frecuentes">Preguntas Frecuentes</a></li>
        </ul>
        <ul class="bottom">
            <li><a href="ayuda.html"><img src="img/logo-ayuda.svg" alt="Logo de Ayuda">Ayuda</a></li>
        </ul>
    </nav>
    <main>
        <div class="container">
            <div class="login-box">
                <h1>Crear Cuenta</h1>
                <p class="subtitle">Únete a EasyTrack hoy</p>
                
                <form id="signup-form">
                    <div class="form-group">
                        <label for="fullname">Nombre Completo:</label>
                        <input type="text" id="fullname" placeholder="Tu nombre" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Correo Electrónico:</label>
                        <input type="email" id="email" placeholder="tu@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña:</label>
                        <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
                        <small class="password-requirements">
                            ✓ Mínimo 6 caracteres
                        </small>
                    </div>

                    <div class="form-group">
                        <label for="password-confirm">Confirmar Contraseña:</label>
                        <input type="password" id="password-confirm" placeholder="Repite tu contraseña" required>
                    </div>

                    <button type="submit" class="btn-submit">Registrarse</button>
                </form>

                <div class="divider">O</div>

                <button id="btn-google" class="btn-google">
                    <span>Registrarse con Google</span>
                </button>

                <p class="signup-link">
                    ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
                </p>

                <div id="error-message" class="error-message"></div>
                <div id="success-message" class="success-message"></div>
            </div>
        </div>
    </main>

    <!-- Importar Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/config-supabase.js"></script>
    <script src="js/signup.js"></script>
</body>
</html>
